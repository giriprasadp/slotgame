version: "3.9"

# ── Huff & Puff — Production Compose ─────────────────────────────────────────
#
# Prerequisites (must already be running on the host):
#   • postgres-db   — postgres:15 listening on host port 5432
#   • my-redis-container — redis:latest listening on host port 6379
#
# Usage:
#   1. Copy .env.example → .env and fill in your values
#   2. Place your RSA keys in ./backend/keys/
#      (or generate them: cd backend && npm run keys:generate)
#   3. docker compose up -d --build
#
# To rebuild after code changes:
#   docker compose build --no-cache && docker compose up -d

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: huffpuff/backend:latest
    container_name: huffpuff_backend
    restart: unless-stopped
    # host.docker.internal lets containers reach host-bound postgres & redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV:                 production
      PORT:                     3000
      DATABASE_URL:             ${DATABASE_URL}
      REDIS_URL:                ${REDIS_URL}
      JWT_PRIVATE_KEY_PATH:     /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH:      /app/keys/public.pem
      JWT_EXPIRY:               ${JWT_EXPIRY:-4h}
      CORS_ORIGIN:              ${CORS_ORIGIN:-*}
      RATE_LIMIT_MAX:           ${RATE_LIMIT_MAX:-20}
      RATE_LIMIT_WINDOW:        ${RATE_LIMIT_WINDOW:-10000}
      ANALYTICS_STREAM_KEY:     ${ANALYTICS_STREAM_KEY:-stream:analytics}
      ANALYTICS_CONSUMER_GROUP: ${ANALYTICS_CONSUMER_GROUP:-analytics-workers}
      ADMIN_API_KEY:            ${ADMIN_API_KEY}
    volumes:
      # Mount RSA key pair — never bake secrets into the image
      - ./backend/keys:/app/keys:ro
    # Backend not exposed to host directly — nginx proxies /api/*
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - huffpuff_net

  # ── Client (nginx static + API proxy) ───────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # When nginx proxies /api → backend on the same compose network,
        # the browser just calls /api/v1 (relative URL = same origin).
        VITE_API_URL: /api/v1
    image: huffpuff/client:latest
    container_name: huffpuff_client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - huffpuff_net

networks:
  huffpuff_net:
    driver: bridge
