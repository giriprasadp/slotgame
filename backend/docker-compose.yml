version: "3.9"

# NOTE: Postgres (postgres-db, port 5432) and Redis (my-redis-container, port 6379)
# are already running as existing containers — do NOT redefine them here.
# This compose file only manages the backend API container.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huffpuff_backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Connect to the existing postgres-db container via host network
      DATABASE_URL: postgres://myuser:pass123@host.docker.internal:5432/huffpuff
      # Connect to the existing my-redis-container via host network
      REDIS_URL: redis://host.docker.internal:6379
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      JWT_EXPIRY: 4h
      CORS_ORIGIN: "*"
      RATE_LIMIT_MAX: 20
      RATE_LIMIT_WINDOW: 10000
      ANALYTICS_STREAM_KEY: stream:analytics
      ANALYTICS_CONSUMER_GROUP: analytics-workers
    ports:
      - "3000:3000"
    volumes:
      - ./keys:/app/keys:ro
